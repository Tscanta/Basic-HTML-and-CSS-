<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Simple Image Gallery</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        
        <div class="gallery">
            <a target="_blank" href="images/fleece .jpg">
                <img src="images/fleece .jpg" alt="Image 1"> 
            </a>
            <div class="desc">Image 1 Description</div>
        </div>

        <div class="gallery">
            <a target="_blank" href="images/land.jpg">
                <img src="images/land.jpg" alt="Image 2">
            </a>
            <div class="desc">Image 2 Description</div>
        </div>

        <div class="gallery">
            <a target="_blank" href="images/pretty princess peach.jpg">
                <img src="images/pretty princess peach.jpg" alt="Image 3">
            </a>
            <div class="desc">Image 3 Description</div>
        </div>

    </body>
</html>
